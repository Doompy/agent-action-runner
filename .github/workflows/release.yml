name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.5.0"
        required: true
        type: string
      title:
        description: "Release title. Defaults to the tag."
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create or update GitHub release
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      RELEASE_TITLE: ${{ github.event_name == 'workflow_dispatch' && (inputs.title || inputs.tag) || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify tag exists
        run: git rev-parse --verify "refs/tags/${RELEASE_TAG}"

      - name: Extract release notes
        run: node scripts/extract-changelog-section.mjs "${RELEASE_TAG}" --out release-notes.md

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TITLE }}
          body_path: release-notes.md
          make_latest: true
